# JWT 配置（根据需要调整）
jwtConfig:
  secret_key: "your-secret-key"
  issuer: "user_hub"
  refresh_secret: "your-refresh-secret"
  access_token_ttl: 3600000000000   # 1小时
  refresh_token_ttl: 86400000000000 # 24小时
  enable_JTI: true

# MySQL 采用的微信云托管自建MySQL服务
mySQLConfig:
  host: "mawhxqew.mysql.lt9g8ugc.b9ly0g35.com"
  port: 3306
  user: "root"
  password: "xuzhihuo@120"
  database: "user_hub"
  charset: "utf8mb4"
  parseTime: true
  loc: "Local"
  maxOpenConn: 50
  maxIdleConn: 30

# Redis 配置（默认值，环境变量会覆盖）
redisConfig:
  address: "mawhxqew.redis.lt9g8ugc.b9ly0g35.com"
  port: 6379
  password: "xuzihuo@120"
  db: 0
  dial_timeout: 5000000000   # 5s
  read_timeout: 3000000000   # 3s
  write_timeout: 3000000000  # 3s

# Zap 日志配置
zapConfig:
  level: "info"  # 生产环境建议用 info
  encoding: "console"
  output_path: "stdout"
  error_output: "stderr"

# rateLimit 配置
rateLimitConfig:
  capacity: 50
  refill_interval: 1s
  cleanup_interval: 5m
  idle_timeout: 10m

server:
  port: "80"  # 改为 80，与微信云托管一致

# 微信云托管 SMS 配置（根据实际填写）
smsConfig:
  appID: "wx1234567890abcdef"
  secret: "abcdefghijklmnopqrstuvwxyz1234567890abcd"
  endpoint: "https://api.weixin.qq.com/sms/send"
  templateID: "SMS_123456789"
  env: "prod-abcdef"

# 微信小程序配置（根据实际填写）
wechatConfig:
  appID: "wx0987654321fedcba"

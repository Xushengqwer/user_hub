version: "3.8"
services:
  app:
    image: user_hub:latest
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
    volumes:
      - ./common/config/config.development.yaml:/app/common/config/config.development.yaml  # 挂载配置文件
    environment:
      - MY_SQL_HOST=mysql
      - MY_SQL_PORT=3306
      - MY_SQL_USER=root
      - MY_SQL_PASSWORD=root
      - REDIS_ADDRESS=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=root
    container_name: user_hub_container

  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=doer_userHub
    volumes:
      - mysql-data:/var/lib/mysql
    container_name: mysql_container

  redis:
    image: redis:7.0
    command: redis-server --requirepass root
    volumes:
      - redis-data:/data
    container_name: redis_container

volumes:
  mysql-data:
  redis-data:
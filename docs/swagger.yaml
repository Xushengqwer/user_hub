      city:
        description: 城市
        example: 深圳
        type: string
      created_at:
        description: 创建时间
        example: "2023-01-01T00:00:00Z"
        type: string
      gender:
        allOf:
        - $ref: '#/definitions/enums.Gender'
        description: 性别（0=未知, 1=男, 2=女）
        example: 1
      nickname:
        description: 昵称
        example: 小明
        type: string
      province:
        description: 省份
        example: 广东
        type: string
      updated_at:
        description: 更新时间
        example: "2023-01-01T00:00:00Z"
        type: string
      user_id:
        description: 用户 ID
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
    type: object
  vo.TokenPair:
    properties:
      access_token:
        description: 新认证令牌
        type: string
      refresh_token:
        description: 新刷新令牌（可选）
        type: string
    type: object
  vo.UserVO:
    properties:
      created_at:
        description: 创建时间
        example: "2023-01-01T00:00:00Z"
        type: string
      status:
        allOf:
        - $ref: '#/definitions/enums.UserStatus'
        description: 用户状态（0=Active, 1=Blacklisted）
        example: 0
      updated_at:
        description: 更新时间
        example: "2023-01-01T00:00:00Z"
        type: string
      user_id:
        description: 用户 ID
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
      user_role:
        allOf:
        - $ref: '#/definitions/enums.UserRole'
        description: 用户角色（0=Admin, 1=User, 2=Guest）
        example: 1
    type: object
  vo.Userinfo:
    properties:
      userID:
        type: string
    type: object
info:
  contact: {}
paths:
  /api/v1/account/login:
    post:
      consumes:
      - application/json
      description: 使用账号和密码进行登录
      parameters:
      - description: 登录信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.AccountLoginData'
      - description: 平台类型
        enum:
        - web
        - wechat
        - app
        in: header
        name: X-Platform
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功
          schema:
            $ref: '#/definitions/response.APIResponse-vo_LoginResponse'
        "400":
          description: 输入参数无效
          schema:
            $ref: '#/definitions/response.APIResponse-any'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.APIResponse-any'
      summary: 账号密码登录
      tags:
      - 账号密码认证
  /api/v1/account/register:
    post:
      consumes:
      - application/json
      description: 使用账号和密码进行注册
      parameters:
      - description: 注册信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.AccountRegisterData'
      produces:
      - application/json
      responses:
        "200":
          description: 注册成功
          schema:
            $ref: '#/definitions/response.APIResponse-vo_Userinfo'
        "400":
          description: 输入参数无效
          schema:
            $ref: '#/definitions/response.APIResponse-any'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.APIResponse-any'
      summary: 账号密码注册
      tags:
      - 账号密码认证
  /api/v1/auth/logout:
    post:
      consumes:
      - application/json
      description: 将当前用户的访问令牌加入黑名单，阻止后续访问
      parameters:
      - description: Bearer 访问令牌
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 退出成功
          schema:
            $ref: '#/definitions/response.APIResponse-vo_Empty'
        "400":
          description: 请求头中缺少 Authorization 或格式错误
          schema:
            $ref: '#/definitions/response.APIResponse-string'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.APIResponse-string'
      summary: 退出登录
      tags:
      - auth
  /api/v1/auth/refresh-token:
    post:
      consumes:
      - application/json
      description: 使用刷新令牌获取新的访问令牌和刷新令牌，支持 JSON 请求体或 HttpOnly Cookie
      parameters:
      - description: 请求体，包含刷新令牌（可选，若使用 Cookie 则可省略）
        in: body
        name: request
        schema:
          $ref: '#/definitions/dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 刷新成功，返回新的令牌对
          schema:
            $ref: '#/definitions/response.APIResponse-vo_TokenPair'
        "400":
          description: 请求参数错误，例如未提供刷新令牌
          schema:
            $ref: '#/definitions/response.APIResponse-string'
        "401":
          description: 刷新令牌无效或已过期
          schema:
            $ref: '#/definitions/response.APIResponse-string'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.APIResponse-string'
      summary: 刷新令牌
      tags:
      - auth
  /api/v1/auth/send-captcha:
    post:
      consumes:
      - application/json
      description: 向指定手机号发送一个 6 位随机数字验证码，有效期为 5 分钟
      parameters:
      - description: 请求体，包含手机号
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.SendCaptchaRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 验证码发送成功
          schema:
            $ref: '#/definitions/response.APIResponse-any'
        "400":
          description: 请求参数错误，例如手机号格式不正确
          schema:
            $ref: '#/definitions/response.APIResponse-string'
        "500":
          description: 服务器内部错误，例如短信发送失败或 Redis 存储失败
          schema:
            $ref: '#/definitions/response.APIResponse-string'
      summary: 发送短信验证码
      tags:
      - auth
  /api/v1/identities:
    post:
      consumes:
      - application/json
      description: 用户绑定新登录方式
      parameters:
      - description: 创建身份请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateIdentityDTO'
      produces:
      - application/json
      responses:
        "200":
          description: 身份创建成功
          schema:
            $ref: '#/definitions/response.APIResponse-vo_IdentityVO'
        "400":
          description: 请求数据无效
          schema:
            $ref: '#/definitions/response.APIResponse-any'
        "500":
          description: 创建身份失败
          schema:
            $ref: '#/definitions/response.APIResponse-any'
      summary: 创建新身份
      tags:
      - 身份管理
  /api/v1/identities/{identityID}:
    delete:
      consumes:
      - application/json
      description: 用户注销某个身份
      parameters:
      - description: 身份 ID
        in: path
        name: identityID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 身份删除成功
          schema:
            $ref: '#/definitions/response.APIResponse-any'
        "400":
          description: 身份 ID 不能为空
          schema:
            $ref: '#/definitions/response.APIResponse-any'
        "404":
          description: 该身份不存在
          schema:
            $ref: '#/definitions/response.APIResponse-any'
        "500":
          description: 删除身份失败
          schema:
            $ref: '#/definitions/response.APIResponse-any'
      summary: 删除身份
      tags:
      - 身份管理
    put:
      consumes:
      - application/json
      description: 用户修改密码等操作
      parameters:
      - description: 身份 ID
        in: path
        name: identityID
        required: true
        type: string
      - description: 更新身份请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateIdentityDTO'
      produces:
      - application/json
      responses:
        "200":
          description: 身份更新成功
          schema:
            $ref: '#/definitions/response.APIResponse-vo_IdentityVO'
        "400":
          description: 请求数据无效
          schema:
            $ref: '#/definitions/response.APIResponse-any'
        "404":
          description: 该身份不存在
          schema:
            $ref: '#/definitions/response.APIResponse-any'
        "500":
          description: 更新身份失败
          schema:
            $ref: '#/definitions/response.APIResponse-any'
      summary: 更新身份信息
      tags:
      - 身份管理
  /api/v1/phone/login:
    post:
      consumes:
      - application/json
      description: 使用手机号和验证码进行登录或注册
      parameters:
      - description: 手机号和验证码
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.PhoneLoginOrRegisterData'
      - description: 平台类型

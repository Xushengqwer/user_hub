definitions:
  dto.AccountLoginData:
    properties:
      account:
        description: 用户账号
        type: string
      password:
        description: 密码
        type: string
    required:
    - account
    - password
    type: object
  dto.AccountRegisterData:
    properties:
      account:
        description: 用户账号
        type: string
      confirmPassword:
        description: 密码
        type: string
      password:
        description: 密码
        type: string
    required:
    - account
    - confirmPassword
    - password
    type: object
  dto.CreateIdentityDTO:
    properties:
      credential:
        description: 凭证（如密码哈希、UnionID）
        example: hashed_password
        type: string
      identifier:
        description: 标识符（如账号、OpenID、手机号）
        example: user123
        type: string
      identity_type:
        allOf:
        - $ref: '#/definitions/enums.IdentityType'
        description: 身份类型（0=账号密码, 1=小程序, 2=手机号）
        example: 0
      user_id:
        description: 用户 ID
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
    required:
    - credential
    - identifier
    - identity_type
    - user_id
    type: object
  dto.CreateProfileDTO:
    properties:
      avatar_url:
        description: 头像 URL
        example: https://example.com/avatar.jpg
        type: string
      city:
        description: 城市
        example: 深圳
        type: string
      gender:
        allOf:
        - $ref: '#/definitions/enums.Gender'
        description: 性别（0=未知, 1=男, 2=女）
        enum:
        - 0
        - 1
        - 2
        example: 1
      nickname:
        description: 昵称
        example: 小明
        type: string
      province:
        description: 省份
        example: 广东
        type: string
      user_id:
        description: 用户 ID
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
    required:
    - user_id
    type: object
  dto.CreateUserDTO:
    properties:
      status:
        allOf:
        - $ref: '#/definitions/enums.UserStatus'
        description: |-
          用户状态（0=活跃, 1=拉黑）
          - 必填字段，验证状态枚举值
        enum:
        - 0
        - 1
      user_role:
        allOf:
        - $ref: '#/definitions/enums.UserRole'
        description: |-
          用户角色（0=管理员, 1=普通用户, 2=客人）
          - 必填字段，验证角色枚举值
        enum:
        - 0
        - 1
        - 2
    required:
    - status
    - user_role
    type: object
  dto.PhoneLoginOrRegisterData:
    properties:
      code:
        description: 验证码，必填
        type: string
      phone:
        description: 手机号，必填
        type: string
    required:
    - code
    - phone
    type: object
  dto.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    type: object
  dto.SendCaptchaRequest:
    properties:
      phone:
        description: 手机号，必填且需符合格式
        type: string
    required:
    - phone
    type: object
  dto.UpdateIdentityDTO:
    properties:
      credential:
        description: 新凭证（如新密码哈希）
        example: new_hashed_password
        type: string
    required:
    - credential
    type: object
  dto.UpdateProfileDTO:
    properties:
      avatar_url:
        description: 头像 URL
        example: https://example.com/avatar.jpg
        type: string
      city:
        description: 城市
        example: 深圳
        type: string
      gender:
        allOf:
        - $ref: '#/definitions/enums.Gender'
        description: 性别（0=未知, 1=男, 2=女）
        enum:
        - 0
        - 1
        - 2
        example: 1
      nickname:
        description: 昵称
        example: 小明
        type: string
      province:
        description: 省份
        example: 广东
        type: string
    type: object
  dto.UpdateUserDTO:
    properties:
      status:
        allOf:
        - $ref: '#/definitions/enums.UserStatus'
        description: 用户状态（0=Active, 1=Blacklisted），可选
        enum:
        - 0
        - 1
        example: 0
      user_role:
        allOf:
        - $ref: '#/definitions/enums.UserRole'
        description: 用户角色（0=Admin, 1=User, 2=Guest），可选
        enum:
        - 0
        - 1
        - 2
        example: 1
    type: object
  dto.UserQueryDTO:
    type: object
  dto.WechatMiniProgramLoginData:
    properties:
      code:
        description: |-
          Code 微信小程序通过 wx.login() 获取的临时授权码
          - 必填，用于后端换取 openid 和 session_key
        type: string
    required:
    - code
    type: object
  enums.Gender:
    enum:
    - 0
    - 1
    - 2
    type: integer
    x-enum-comments:
      Female: 女性
      Male: 男性
      Unknown: 未知
    x-enum-varnames:
    - Unknown
    - Male
    - Female
  enums.IdentityType:
    enum:
    - 0
    - 1
    - 2
    type: integer
    x-enum-comments:
      AccountPassword: 账号密码（网站）
      Phone: 手机号（APP）
      WechatMiniProgram: 微信（小程序）
    x-enum-varnames:
    - AccountPassword
    - WechatMiniProgram
    - Phone
  enums.UserRole:
    enum:
    - 0
    - 1
    - 2
    type: integer
    x-enum-comments:
      Admin: 0 - 管理员
      Guest: 2 - 客人
      User: 1 - 普通用户
    x-enum-varnames:
    - Admin
    - User
    - Guest
  enums.UserStatus:
    enum:
    - 0
    - 1
    type: integer
    x-enum-comments:
      Active: 活跃
      Blacklisted: 拉黑
    x-enum-varnames:
    - Active
    - Blacklisted
  response.APIResponse-any:
    properties:
      code:
        description: 响应状态码，0 表示成功，其他值表示错误
        example: 0
        type: integer
      data:
        description: 响应数据，类型由 T 指定，若无数据则为 nil，且在 JSON 中省略
      message:
        description: 可选的响应消息，若为空则不输出
        example: success
        type: string
    type: object
  response.APIResponse-string:
    properties:
      code:
        description: 响应状态码，0 表示成功，其他值表示错误
        example: 0
        type: integer
      data:
        description: 响应数据，类型由 T 指定，若无数据则为 nil，且在 JSON 中省略
        type: string
      message:
        description: 可选的响应消息，若为空则不输出
        example: success
        type: string
    type: object
  response.APIResponse-vo_Empty:
    properties:
      code:
        description: 响应状态码，0 表示成功，其他值表示错误
        example: 0
        type: integer
      data:
        allOf:
        - $ref: '#/definitions/vo.Empty'
        description: 响应数据，类型由 T 指定，若无数据则为 nil，且在 JSON 中省略
      message:
        description: 可选的响应消息，若为空则不输出
        example: success
        type: string
    type: object
  response.APIResponse-vo_IdentityList:
    properties:
      code:
        description: 响应状态码，0 表示成功，其他值表示错误
        example: 0
        type: integer
      data:
        allOf:
        - $ref: '#/definitions/vo.IdentityList'
        description: 响应数据，类型由 T 指定，若无数据则为 nil，且在 JSON 中省略
      message:
        description: 可选的响应消息，若为空则不输出
        example: success
        type: string
    type: object
  response.APIResponse-vo_IdentityTypeList:
    properties:
      code:
        description: 响应状态码，0 表示成功，其他值表示错误
        example: 0
        type: integer
      data:
        allOf:
        - $ref: '#/definitions/vo.IdentityTypeList'
        description: 响应数据，类型由 T 指定，若无数据则为 nil，且在 JSON 中省略
      message:
        description: 可选的响应消息，若为空则不输出
        example: success
        type: string
    type: object
  response.APIResponse-vo_IdentityVO:
    properties:
      code:
        description: 响应状态码，0 表示成功，其他值表示错误
        example: 0
        type: integer
      data:
        allOf:
        - $ref: '#/definitions/vo.IdentityVO'
        description: 响应数据，类型由 T 指定，若无数据则为 nil，且在 JSON 中省略
      message:
        description: 可选的响应消息，若为空则不输出
        example: success
        type: string
    type: object
  response.APIResponse-vo_LoginResponse:
    properties:
      code:
        description: 响应状态码，0 表示成功，其他值表示错误
        example: 0
        type: integer
      data:
        allOf:
        - $ref: '#/definitions/vo.LoginResponse'
        description: 响应数据，类型由 T 指定，若无数据则为 nil，且在 JSON 中省略
      message:
        description: 可选的响应消息，若为空则不输出
        example: success
        type: string
    type: object
  response.APIResponse-vo_ProfileVO:
    properties:
      code:
        description: 响应状态码，0 表示成功，其他值表示错误
        example: 0
        type: integer
      data:
        allOf:
        - $ref: '#/definitions/vo.ProfileVO'
        description: 响应数据，类型由 T 指定，若无数据则为 nil，且在 JSON 中省略
      message:
        description: 可选的响应消息，若为空则不输出
        example: success
        type: string
    type: object
  response.APIResponse-vo_TokenPair:
    properties:
      code:
        description: 响应状态码，0 表示成功，其他值表示错误
        example: 0
        type: integer
      data:
        allOf:
        - $ref: '#/definitions/vo.TokenPair'
        description: 响应数据，类型由 T 指定，若无数据则为 nil，且在 JSON 中省略
      message:
        description: 可选的响应消息，若为空则不输出
        example: success
        type: string
    type: object
  response.APIResponse-vo_UserVO:
    properties:
      code:
        description: 响应状态码，0 表示成功，其他值表示错误
        example: 0
        type: integer
      data:
        allOf:
        - $ref: '#/definitions/vo.UserVO'
        description: 响应数据，类型由 T 指定，若无数据则为 nil，且在 JSON 中省略
      message:
        description: 可选的响应消息，若为空则不输出
        example: success
        type: string
    type: object
  response.APIResponse-vo_Userinfo:
    properties:
      code:
        description: 响应状态码，0 表示成功，其他值表示错误
        example: 0
        type: integer
      data:
        allOf:
        - $ref: '#/definitions/vo.Userinfo'
        description: 响应数据，类型由 T 指定，若无数据则为 nil，且在 JSON 中省略
      message:
        description: 可选的响应消息，若为空则不输出
        example: success
        type: string
    type: object
  vo.Empty:
    type: object
  vo.IdentityList:
    properties:
      items:
        items:
          $ref: '#/definitions/vo.IdentityVO'
        type: array
    type: object
  vo.IdentityTypeList:
    properties:
      items:
        items:
          $ref: '#/definitions/enums.IdentityType'
        type: array
    type: object
  vo.IdentityVO:
    properties:
      created_at:
        description: 创建时间
        example: "2023-01-01T00:00:00Z"
        type: string
      identifier:
        description: 标识符（如账号、OpenID、手机号）
        example: user123
        type: string
      identity_id:
        description: 身份 ID
        example: 1
        type: integer
      identity_type:
        allOf:
        - $ref: '#/definitions/enums.IdentityType'
        description: 身份类型（0=账号密码, 1=小程序, 2=手机号）
        example: 0
      updated_at:
        description: 更新时间
        example: "2023-01-01T00:00:00Z"
        type: string
      user_id:
        description: 用户 ID
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
    type: object
  vo.LoginResponse:
    properties:
      token:
        allOf:
        - $ref: '#/definitions/vo.TokenPair'
        description: Token 对
      user:
        allOf:
        - $ref: '#/definitions/vo.Userinfo'
        description: 用户信息
    type: object
  vo.ProfileVO:
    properties:
      avatar_url:
        description: 头像 URL
        example: https://example.com/avatar.jpg
